type Organization {
  id: ID!
  name: String
  teams: [Team!]!
}

type Team {
  id: ID!
  name: String!
  organization: Organization!
  posts: [Post!]!
}

type User {
  id: ID!
  email: String
  name: String!
}

type Post {
  id: ID!
  title: String!
  content: String
  published: Boolean!
  author: User!
  team: Team!
  sharedWith: [User!]
}

type Query {
  posts: [Post!]
}

type Mutation {
  login(input: LoginInput!): User!
}

input LoginInput {
  email: String!
  password: String!
}
